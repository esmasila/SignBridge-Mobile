<title>Step 4 — Blender Animasyon Oynatıcı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Segoe UI',sans-serif;
  background:#08090e;color:#e2e8f0;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  position:relative;
}
/* Subtle glow orbs in background for depth */
body::before{
  content:"";position:fixed;width:480px;height:480px;border-radius:50%;
  background:radial-gradient(circle,rgba(108,99,255,0.18),transparent 70%);
  top:-180px;left:-120px;z-index:0;pointer-events:none;
  filter:blur(40px);
}
body::after{
  content:"";position:fixed;width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(34,211,238,0.12),transparent 70%);
  bottom:-150px;right:-100px;z-index:0;pointer-events:none;
  filter:blur(40px);
}
#topbar,#main{position:relative;z-index:1}

#topbar{
  display:flex;align-items:center;gap:12px;
  padding:0 18px;height:58px;
  background:rgba(15,17,26,0.7);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  flex-shrink:0;
}
.logo{
  font-weight:800;font-size:1rem;letter-spacing:-0.02em;
  background:linear-gradient(135deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.badge{
  padding:3px 10px;border-radius:999px;font-size:.66rem;font-weight:800;
  background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;
  box-shadow:0 4px 14px rgba(108,99,255,0.4);letter-spacing:0.02em;
}
#glossInput,#sentenceInput{
  padding:9px 14px;border-radius:10px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:#e2e8f0;font-size:.88rem;outline:none;
  transition:all .2s;
}
#glossInput::placeholder,#sentenceInput::placeholder{color:#64748b}
#glossInput:focus,#sentenceInput:focus{
  border-color:rgba(108,99,255,0.5);
  background:rgba(108,99,255,0.06);
  box-shadow:0 0 0 3px rgba(108,99,255,0.12);
}
.btn{
  padding:9px 16px;border-radius:10px;border:none;cursor:pointer;
  font-weight:700;font-size:.84rem;transition:all .18s;
}
.btn:active{transform:scale(.96)}
.btn-accent{
  background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff;
  box-shadow:0 6px 18px rgba(108,99,255,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(108,99,255,0.55)}
.btn-gray{
  background:rgba(255,255,255,0.05);color:#94a3b8;
  border:1px solid rgba(255,255,255,0.08);
}
.btn-gray:hover{background:rgba(255,255,255,0.09);color:#e2e8f0;border-color:rgba(255,255,255,0.14)}
.speed-wrap{display:flex;align-items:center;gap:8px;font-size:.78rem;color:#94a3b8;font-weight:600}
#speedRange{
  width:90px;height:5px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#6c63ff,#22d3ee);
  border-radius:999px;outline:none;cursor:pointer;
}
#speedRange::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:#fff;border:2px solid #6c63ff;
  box-shadow:0 0 12px rgba(108,99,255,0.6);
  cursor:pointer;transition:transform .15s;
}
#speedRange::-webkit-slider-thumb:hover{transform:scale(1.2)}
#speedVal{
  font-weight:800;color:#a78bfa;min-width:36px;
  font-variant-numeric:tabular-nums;
}

/* ═══════════ Hızlı Cümleler Barı ═══════════ */
#quick-bar{
  display:flex;align-items:center;gap:14px;
  padding:10px 22px;
  background:rgba(15,17,26,0.55);
  border-bottom:1px solid rgba(255,255,255,0.04);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  flex-shrink:0;
  position:relative;z-index:1;
}
.qp-label{
  display:flex;align-items:center;gap:6px;
  font-size:.7rem;font-weight:800;letter-spacing:.06em;
  text-transform:uppercase;
  background:linear-gradient(135deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  flex-shrink:0;
}
.qp-label svg{width:14px;height:14px;color:#a78bfa}
.qp-chips{
  display:flex;gap:8px;
  overflow-x:auto;
  padding-bottom:2px;
  scrollbar-width:thin;
  scroll-behavior:smooth;
}
.qp-chips::-webkit-scrollbar{height:4px}
.qp-chips::-webkit-scrollbar-track{background:transparent}
.qp-chips::-webkit-scrollbar-thumb{background:rgba(108,99,255,0.3);border-radius:99px}
.qp-chip{
  flex-shrink:0;
  padding:7px 14px;
  border-radius:999px;
  border:1px solid rgba(108,99,255,0.22);
  background:rgba(108,99,255,0.08);
  color:#c4b5fd;
  font-size:.78rem;font-weight:600;
  cursor:pointer;
  font-family:inherit;
  white-space:nowrap;
  transition:all .2s;
}
.qp-chip:hover{
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  border-color:transparent;
  color:#fff;
  transform:translateY(-1px);
  box-shadow:0 8px 22px rgba(108,99,255,0.45);
}
.qp-chip:active{transform:scale(.96)}

#main{display:flex;flex:1;overflow:hidden}
#canvas-col{flex:1;position:relative;overflow:hidden}
canvas{display:block}

#loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:#08090e;z-index:50;
}
.spinner{
  width:42px;height:42px;
  border:3px solid rgba(108,99,255,0.15);
  border-top-color:#a78bfa;
  border-radius:50%;animation:spin .7s linear infinite;
  box-shadow:0 0 30px rgba(108,99,255,0.3);
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-label{font-size:.85rem;color:#94a3b8;font-weight:500}

#status{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  padding:7px 16px;border-radius:999px;font-size:.78rem;font-weight:700;
  background:rgba(108,99,255,0.85);backdrop-filter:blur(14px);
  color:#fff;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 26px rgba(108,99,255,0.4);
  z-index:10;pointer-events:none;transition:opacity .3s;opacity:0;
}
#word-display{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  font-size:1.6rem;font-weight:900;
  background:linear-gradient(135deg,#fff,#c4b5fd);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:-0.02em;
  text-shadow:0 0 30px rgba(167,139,250,0.6);
  filter:drop-shadow(0 4px 18px rgba(108,99,255,0.7));
  z-index:10;pointer-events:none;opacity:0;transition:opacity .3s;
}
#progress-bar{
  position:absolute;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,#6c63ff,#22d3ee);
  width:0%;z-index:10;
  box-shadow:0 0 16px rgba(108,99,255,0.7);
}

#sidebar{
  width:240px;
  background:rgba(15,17,26,0.7);
  border-left:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
#sidebar-header{
  padding:14px 14px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:.72rem;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;
}
#sidebar-header span:first-child{
  background:linear-gradient(135deg,#a78bfa,#22d3ee);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sb-count{
  padding:3px 10px;border-radius:999px;
  background:linear-gradient(135deg,rgba(108,99,255,0.18),rgba(34,211,238,0.12));
  border:1px solid rgba(108,99,255,0.25);
  color:#c4b5fd;font-size:0.66rem;font-weight:800;
  font-variant-numeric:tabular-nums;letter-spacing:0;
  -webkit-text-fill-color:#c4b5fd;
}

/* Search */
.sb-search-wrap{position:relative;padding:10px 12px 8px}
.sb-search-wrap svg{
  position:absolute;left:23px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:#64748b;pointer-events:none;
}
#sbSearch{
  width:100%;padding:8px 10px 8px 32px;
  border-radius:9px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:#e2e8f0;font-size:.8rem;font-weight:500;outline:none;
  transition:all .2s;font-family:inherit;
}
#sbSearch::placeholder{color:#64748b}
#sbSearch:focus{
  border-color:rgba(108,99,255,0.5);
  background:rgba(108,99,255,0.06);
  box-shadow:0 0 0 3px rgba(108,99,255,0.12);
}

/* Word grid: 2 columns, compact chips */
#word-list{
  flex:1;overflow-y:auto;padding:6px 10px 10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
  align-content:flex-start;
}
#word-list::-webkit-scrollbar{width:5px}
#word-list::-webkit-scrollbar-track{background:transparent}
#word-list::-webkit-scrollbar-thumb{background:rgba(108,99,255,0.3);border-radius:99px}
#word-list::-webkit-scrollbar-thumb:hover{background:rgba(108,99,255,0.5)}

.w-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:8px 6px;
  border-radius:8px;border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.03);
  color:#94a3b8;cursor:pointer;
  font-size:.7rem;font-weight:700;
  text-align:center;font-family:inherit;
  transition:all .18s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  position:relative;
}
.w-btn:hover{
  background:rgba(108,99,255,0.10);
  border-color:rgba(108,99,255,0.3);
  color:#e2e8f0;
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(108,99,255,0.18);
}
.w-btn.active{
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  border-color:transparent;color:#fff;
  box-shadow:0 6px 18px rgba(108,99,255,0.45),inset 0 1px 0 rgba(255,255,255,0.18);
  transform:scale(1.04);
}
.w-btn .tag{display:none}
.tag-anim,.tag-json{display:none}

.sb-empty{
  display:none;
  text-align:center;padding:18px 12px;
  color:#475569;font-size:0.78rem;font-style:italic;font-weight:500;
}
.sb-empty.show{display:block}

#info-bar{
  padding:10px 16px;
  border-top:1px solid rgba(255,255,255,0.06);
  font-size:.7rem;color:#64748b;font-weight:600;
  display:flex;flex-direction:column;gap:3px;
  background:rgba(0,0,0,0.2);
}
#info-bar span span{color:#a78bfa;font-weight:800;font-variant-numeric:tabular-nums}
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const GLB_BASE = 'rain.glb';
const GLB_ANIM = 'rain_animated.glb';

// Speed slider
const speedRange = document.getElementById('speedRange');
const speedVal = document.getElementById('speedVal');
speedRange.oninput = () => { speedVal.textContent = parseFloat(speedRange.value).toFixed(1)+'x'; };

// ═══════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════
const col = document.getElementById('canvas-col');
const scene = new THREE.Scene();

const isMobile = params.has('mobile');

let avatar = null;
let savedPoses = {};  // JSON poses from pose editor
let bones = {};
let tLocalQ = {};     // T-pose quaternions
let ready = false;

const loader = new GLTFLoader();

loader.load(GLB_BASE,
  gltf => {
    avatar = gltf.scene;
    avatar.traverse(o => {
      o.castShadow = true;
      if(o.isMesh) o.receiveShadow = true;
      if(o.isBone) bones[o.name] = o;
    });

    avatar.scale.setScalar(1); avatar.position.set(0,0,0);
    scene.add(avatar); avatar.updateMatrixWorld(true);
    const bb = new THREE.Box3();
    avatar.traverse(o => { if(o.isMesh||o.isSkinnedMesh) bb.expandByObject(o); });
    const h = bb.isEmpty()?1:(bb.max.y-bb.min.y);
    const sc = h>.01?1.7/h:1;
    avatar.scale.setScalar(sc);
    avatar.position.set(0,-(bb.isEmpty()?0:bb.min.y)*sc,0);
    avatar.updateMatrixWorld(true);

    const fb = new THREE.Box3().setFromObject(avatar);
    const ctr = new THREE.Vector3(); fb.getCenter(ctr);
    const sz = new THREE.Vector3(); fb.getSize(sz);
    if(isMobile){
      // Mobile: show full avatar, no zoom needed, disable orbit controls
      camera.position.set(0, ctr.y, sz.y*1.8);
      controls.target.set(0, ctr.y, 0);
      controls.enableZoom = false;
      controls.enablePan = false;
      controls.enableRotate = false;
    } else {
      camera.position.set(0, ctr.y+sz.y*.1, sz.y*1.5);
      controls.target.set(0, ctr.y, 0);
    }
    controls.update();

    // Save T-pose quaternions
    avatar.traverse(o => { if(o.isBone) tLocalQ[o.name] = o.quaternion.clone(); });
    // Debug: log bone names and eye meshes
    console.log('[DEBUG] All bones:', Object.keys(tLocalQ));
    avatar.traverse(o => {
      if((o.isMesh||o.isSkinnedMesh) && (o.name||'').toLowerCase().includes('eye'))
        console.log('[DEBUG] Eye mesh:', o.name, o.type);
    });

    ready = true;

    // Apply idle pose (arms down instead of T-pose)
    applyIdlePose();

    // Fix ponytail hair (gravity)
    fixHairGravity();

    // Fix eyes (add pupils)
    addEyePupils();
    setLoad(false);
    setStatus('Avatar yuklendi, pozlar yukleniyor...', 0);

    // Load poses: try offline first (injected by mobile app), then server
    function loadPoses(data){
      savedPoses = data;
      const count = Object.keys(savedPoses).length;
      document.getElementById('st-count').textContent = count;
      setStatus(count + ' poz yuklendi', 2500);
      buildWordList();
      console.info(`[Step4] ${count} poz yuklendi:`, Object.keys(savedPoses));
    }
    if(window._offlinePoses){
      loadPoses(window._offlinePoses);
    } else {
      fetch('/api/list-poses').then(r=>r.json()).then(d=>{
        if(d.poses) loadPoses(d.poses);
        else if(Object.keys(d).length > 0) loadPoses(d);
      }).catch(e=>{
        console.warn('API poz yuklenemedi, saved_poses.json deneniyor:', e);
        fetch('saved_poses.json').then(r=>r.json()).then(d=>{
          if(d.poses) loadPoses(d.poses);
          else if(Object.keys(d).length > 0) loadPoses(d);
        }).catch(e2=>{
          console.warn('Poz yuklenemedi:', e2);
          setStatus('Pozlar yuklenemedi!', 5000);
        });
      });
    }
  },
  xhr => {
    if(xhr.total) document.getElementById('load-label').textContent = '%'+Math.round(xhr.loaded/xhr.total*100)+' yuklendi';
  },
  err => {
    console.error('GLB yuklenemedi', err);
    setLoad(false);
    setStatus('GLB yuklenemedi!');
  }
);

// Idle pose: arms down at sides (not T-pose)
const IDLE_POSE = {
  'FK-UpperarmR': {x: 0.2, y: 0.15, z: 1.3},
  'FK-UpperarmL': {x: 0.2, y: -0.15, z: -1.3},
  'FK-ForearmR': {x: 0.15, y: 0, z: 0},
  'FK-ForearmL': {x: 0.15, y: 0, z: 0},
};
let idleApplied = false;

function applyIdlePose(){
  console.log('[DEBUG] applyIdlePose called, ready=', ready, 'bones:', Object.keys(bones).length);
  for(const boneId in IDLE_POSE){
    const bone = bones[boneId];
    if(!bone || !tLocalQ[boneId]){ console.warn('[DEBUG] Missing bone:', boneId); continue; }
    const r = IDLE_POSE[boneId];
    const euler = new THREE.Euler(r.x, r.y, r.z, 'XYZ');
    const q = new THREE.Quaternion().setFromEuler(euler);
    bone.quaternion.copy(tLocalQ[boneId].clone().multiply(q));
    console.log('[DEBUG] Applied idle to', boneId);
  }
  idleApplied = true;
}

function fixHairGravity(){
  const hairBones = ['FK-Hair_Ponytail1','FK-Hair_Ponytail2','FK-Hair_Ponytail3','FK-Hair_Ponytail4'];
  let found = 0;
  hairBones.forEach((name, i) => {
    const b = bones[name];
    if(!b){ console.warn('[DEBUG] Missing hair bone:', name); return; }
    found++;
    const angle = (i+1) * 0.15;
    const euler = new THREE.Euler(angle, 0, 0, 'XYZ');
    const q = new THREE.Quaternion().setFromEuler(euler);
    b.quaternion.copy(tLocalQ[name].clone().multiply(q));
  });
  console.log('[DEBUG] fixHairGravity found', found, '/', hairBones.length, 'bones');
}

function addEyePupils(){
  if(!avatar) return;
  // Find eye bones to get positions for pupils
  let eyeL = null, eyeR = null;
  avatar.traverse(o => {
    if(!o.isBone) return;
    const n = o.name;
    // CloudRig eye bones
    if(n === 'MCH-Eye_ParentL' || n === 'DEF-EyeL' || n === 'FK-EyeL') eyeL = o;
    if(n === 'MCH-Eye_ParentR' || n === 'DEF-EyeR' || n === 'FK-EyeR') eyeR = o;
  });
  console.log('[DEBUG] Eye bones found: L=', eyeL?.name, 'R=', eyeR?.name);

  // Find the eyes mesh and get its bounding box to determine eye size
  let eyesMesh = null;
  avatar.traverse(o => {
    if((o.isMesh || o.isSkinnedMesh) && o.name === 'GEO-rain-eyes') eyesMesh = o;
  });

  if(eyesMesh){
    // Create iris+pupil as flat circles on the eyes mesh
    const irisMat = new THREE.MeshStandardMaterial({
      color: 0x3d2b1f, roughness: 0.5, metalness: 0.0, side: THREE.DoubleSide
    });
    const pupilMat = new THREE.MeshStandardMaterial({
      color: 0x0a0a0a, roughness: 0.3, metalness: 0.0, side: THREE.DoubleSide
    });

    // Get world positions of eye bones or estimate from mesh
    const addPupilToEye = (eyeBone, side) => {
      if(!eyeBone) return;
      const wp = new THREE.Vector3();
      eyeBone.getWorldPosition(wp);
      console.log('[DEBUG] Eye bone', side, 'world pos:', wp.x.toFixed(4), wp.y.toFixed(4), wp.z.toFixed(4));

      // Add to scene but update position every frame to follow eye bone
      const irisM = new THREE.MeshBasicMaterial({color: 0x3d2b1f, depthTest: true, depthWrite: false, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1});
      const iris = new THREE.Mesh(new THREE.CircleGeometry(0.014, 32), irisM);
      scene.add(iris);

      const pupilM = new THREE.MeshBasicMaterial({color: 0x050505, depthTest: true, depthWrite: false, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2});
      const pupil = new THREE.Mesh(new THREE.CircleGeometry(0.007, 32), pupilM);
      scene.add(pupil);

      // Store for animation loop update
      if(!window._eyePupils) window._eyePupils = [];
      window._eyePupils.push({bone: eyeBone, iris, pupil});

      console.log('[DEBUG] Added tracked iris+pupil for', side);
    };

    addPupilToEye(eyeL, 'L');
    addPupilToEye(eyeR, 'R');

    // If no eye bones found, try to estimate positions from mesh geometry
    if(!eyeL && !eyeR){
      console.warn('[DEBUG] No eye bones, listing all bones with Eye in name:');
      avatar.traverse(o => {
        if(o.isBone && o.name.toLowerCase().includes('eye')) console.log('  ', o.name);
      });
    }
  }
}

// Smooth easing function
function easeInOut(t){ return t*t*t*(t*(6*t-15)+10); } // smootherstep

// Apply a pose with interpolation factor t (0=T-pose, 1=full pose)
function applyPoseWithT(pose, t){
  // Reset to idle pose (not T-pose)
  for(const name in tLocalQ){
    if(bones[name]) bones[name].quaternion.copy(tLocalQ[name]);
  }
  // Apply idle pose as base
  for(const boneId in IDLE_POSE){
    const bone = bones[boneId];
    if(!bone || !tLocalQ[boneId]) continue;
    const r = IDLE_POSE[boneId];
    const euler = new THREE.Euler(r.x, r.y, r.z, 'XYZ');
    const q = new THREE.Quaternion().setFromEuler(euler);
    bone.quaternion.copy(tLocalQ[boneId].clone().multiply(q));
  }
  if(!pose || t <= 0) return;
  // Apply pose rotations
  for(const boneId in pose){
    const bone = bones[boneId];
    if(!bone || !tLocalQ[boneId]) continue;
    const r = pose[boneId];
    const euler = new THREE.Euler(r.x * t, r.y * t, r.z * t, 'XYZ');
    const q = new THREE.Quaternion().setFromEuler(euler);
    bone.quaternion.copy(tLocalQ[boneId].clone().multiply(q));
  }
}

// PLAYBACK
// ═══════════════════════════════════════════════
let _playing = false;
let _stopFlag = false;

// Interpolate between two pose keyframes
function lerpPosePlayer(poseA, poseB, t){
  const mixed = {};
  const allBones = new Set([...Object.keys(poseA||{}), ...Object.keys(poseB||{})]);
  for(const boneId of allBones){
    const a = (poseA && poseA[boneId]) || {x:0,y:0,z:0};
    const b = (poseB && poseB[boneId]) || {x:0,y:0,z:0};
    mixed[boneId] = {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t};
  }
  applyPoseWithT(mixed, 1);
}

window.playWord = async function(){
  const word = document.getElementById('glossInput').value.trim().toUpperCase();
  if(!word || !ready) return;

  let poseData = savedPoses[word];
  if(!poseData){
    setStatus('"' + word + '" pozu bulunamadi', 2500);
    return;
  }

  // Normalize: old format (single dict) -> array
  const keyframes = Array.isArray(poseData) ? poseData : [poseData];

  if(_playing){ _stopFlag=true; await new Promise(r=>setTimeout(r,100)); }

  const speed = parseFloat(speedRange.value);
  // Optimized: steps 55->35, frameDelay 12->10 (2x hizli animasyon)
  const steps = Math.max(15, Math.round(35 / speed));
  const frameDelay = Math.max(3, Math.round(10 / speed));
  const zeroPose = {};

  document.getElementById('st-anim').textContent = word;
  document.querySelectorAll('.w-btn').forEach(b => b.classList.toggle('active', b.dataset.word===word));

  _playing = true; _stopFlag = false;
  document.getElementById('stopBtn').style.display = '';
  showWord(word);

  const totalPhases = keyframes.length + 1; // transitions + hold
  let phase = 0;

  // Phase 1: idle -> first keyframe (with easing)
  for(let i=0; i<=steps && !_stopFlag; i++){
    applyPoseWithT(keyframes[0], easeInOut(i/steps));
    document.getElementById('progress-bar').style.width = ((i/steps)/(totalPhases+1)*100)+'%';
    await new Promise(r=>setTimeout(r, frameDelay));
  }
  phase++;

  // Keyframe transitions (Optimized: 200ms -> 100ms)
  for(let k=0; k<keyframes.length-1 && !_stopFlag; k++){
    await new Promise(r=>setTimeout(r, 100/speed));
    for(let i=0; i<=steps && !_stopFlag; i++){
      lerpPosePlayer(keyframes[k], keyframes[k+1], easeInOut(i/steps));
      document.getElementById('progress-bar').style.width = (((phase+i/steps)/(totalPhases+1))*100)+'%';
      await new Promise(r=>setTimeout(r, frameDelay));
    }
    phase++;
  }

  // Hold last keyframe (Optimized: 600ms -> 300ms)
  if(!_stopFlag){
    document.getElementById('progress-bar').style.width = ((phase/(totalPhases+1))*100)+'%';
    await new Promise(r=>setTimeout(r, 300/speed));
  }

  // Last keyframe -> idle (with easing)
  const lastKF = keyframes[keyframes.length-1];
  for(let i=steps; i>=0 && !_stopFlag; i--){
    applyPoseWithT(lastKF, easeInOut(i/steps));
    document.getElementById('progress-bar').style.width = (((phase+(1-i/steps))/(totalPhases+1))*100)+'%';
    await new Promise(r=>setTimeout(r, frameDelay));
  }

  applyIdlePose();
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('stopBtn').style.display = 'none';
  _playing = false;
  hideWord();
  document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active'));
};

window.stopPlay = function(){
  _stopFlag = true;
  _playing = false;
  applyIdlePose();
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  hideWord();
  document.querySelectorAll('.w-btn').forEach(b => b.classList.remove('active'));
};

// Mobile input handler
// Turkish character normalization
function normTR(s){
  return s.toUpperCase()
    .replace(/İ/g,'I').replace(/Ş/g,'S').replace(/Ç/g,'C')
    .replace(/Ö/g,'O').replace(/Ü/g,'U').replace(/Ğ/g,'G')
    .replace(/ı/gi,'I').replace(/ş/gi,'S').replace(/ç/gi,'C')
    .replace(/ö/gi,'O').replace(/ü/gi,'U').replace(/ğ/gi,'G');
}

// Turkish NLP: strip suffixes to find known root words
function turkishToGloss(text){
  const knownWords = Object.keys(savedPoses);
  // Detect question
  const raw = text.trim();
  const isQuestion = /\?/.test(raw) || /\b(MI|MU|MÜ|Mİ|MISIN|MUSUN|MIDIR|MUDUR)\b/i.test(normTR(raw));
  // Remove question marks and question particles before processing
  const cleaned = normTR(raw).replace(/\?/g,'').replace(/\b(MI|MU|MISIN|MUSUN|MIDIR|MUDUR|MIYIZ|MUYUZ)\b/g,'').trim();
  const words = cleaned.split(/\s+/).filter(w=>w);
  const result = [];
  // Turkish suffixes to strip (longest first)
  const suffixes = [
    // Complex compound suffixes (longest first)
    'DAYDIM','DEYDIM','TAYDIN','TEYDIN','DAYDIK','DEYDIK',
    'DAYDIN','DEYDIN','DAYDI','DEYDI',
    'IYORUM','IYORSUN','UYORUM','UYORSUN',
    // Cohortative (1.cogul yapalim/gidelim/icelim)
    'YELIM','YALIM','ELIM','ALIM','SUNUZ','SINIZ',
    'LARINA','LERINE','LARINI','LERINI','LARIMIZ','LERIMIZ',
    'LARDAN','LERDEN','LARIN','LERIN','LARI','LERI','LARA','LERE',
    'IMIZI','INIZI','UMUZ','UNUZ','MIZI','NIZI',
    'SINI','SINE','INDA','INDE','NDAN','NDEN','IYOR','UYOR',
    'SINIZ','SUNUZ','ACAK','ECEK','ACAGIM','ECEGIM',
    'ININ','UNUN',
    'MISTIM','MUSTUM','MISTIN','MUSTUN',
    'MISTI','MUSTU','MISTIK','MUSTUK',
    'DAN','DEN','TAN','TEN',
    'YOR','MIS','MUS','DIR','TIR','DUR','TUR',
    'SIN','SUN','YIM','YUM','YIZ','YUZ',
    'INA','INE','UNA','UNE',
    'INI','UNU','NIN','NUN',
    'DA','DE','TA','TE',
    'DI','DU','TI','TU',
    'IM','UM','IN','UN','IZ','UZ',
    'YI','YU','YA','YE',
    'MI','MU','SI','SU',
    'LA','LE','CI','CU','LI','LU',
    'I','U','A','E'
  ];

  // Multi-word pose keys
  const multiWordPoses = knownWords.filter(k => k.includes(' '));

  let i = 0;
  while(i < words.length){
    // Try multi-word match first (2-3 words)
    let multiFound = false;
    for(let len=3; len>=2; len--){
      if(i+len <= words.length){
        const combined = words.slice(i, i+len).join(' ');
        if(savedPoses[combined]){ result.push(combined); i+=len; multiFound=true; break; }
      }
    }
    if(multiFound) continue;

    const word = words[i]; i++;
    // Direct match
    if(savedPoses[word]){ result.push(word); continue; }
    // Try stripping suffixes
    let found = false;
    for(const suf of suffixes){
      if(word.length > suf.length + 1 && word.endsWith(suf)){
        const root = word.slice(0, -suf.length);
        if(root.length >= 2 && savedPoses[root]){ result.push(root); found=true; break; }
      }
    }
    if(!found){
      // Try partial match (word starts with a known word)
      let bestMatch = '';
      for(const kw of knownWords){
        if(word.startsWith(kw) && kw.length > bestMatch.length) bestMatch = kw;
      }
      if(bestMatch.length >= 2) result.push(bestMatch);
      else console.log('[NLP] Bilinmeyen kelime:', word);
    }
  }
  // Add SORU at the end if question detected
  if(isQuestion && savedPoses['SORU']) result.push('SORU');
  return result;
}

window.mobileSend = async function(){
  const input = document.getElementById('mobile-gloss');
  const text = input.value.trim();
  if(!text) return;
  const glosses = turkishToGloss(text);
  console.log('[NLP] Input:', text, '-> Glosses:', glosses);
  if(glosses.length === 0){
    setStatus('Bilinen kelime bulunamadi', 2000);
    return;
  }
  document.getElementById('mobile-send').style.display='none';
  document.getElementById('mobile-stop').style.display='';
  await window.playSentenceFromMobile(glosses);
  document.getElementById('mobile-send').style.display='';
  document.getElementById('mobile-stop').style.display='none';
};

function toTurkishDisplay(w){
  const map = {
    'ABLA':'ABLA','ABI':'ABİ','AFERIN':'AFERİN','AGUSTOS':'AĞUSTOS',
    'AKILLI':'AKILLI','AKRABA':'AKRABA','AKSAM':'AKŞAM','ALERJI':'ALERJİ',
    'ALLAH':'ALLAH','ALTI':'ALTI','AMCA':'AMCA','AMIN':'AMİN','ANNE':'ANNE',

// NLP — Türkçe Cümle → İşaret Dili Kelimeleri
// ═══════════════════════════════════════════════

// Türkçe karakter dönüşümü
function turkishToASCII(s){
  return s.replace(/ş/gi,'S').replace(/ç/gi,'C').replace(/ğ/gi,'G')
          .replace(/ü/gi,'U').replace(/ö/gi,'O').replace(/ı/g,'I')
          .replace(/İ/g,'I').replace(/Ş/g,'S').replace(/Ç/g,'C')
          .replace(/Ğ/g,'G').replace(/Ü/g,'U').replace(/Ö/g,'O');
}

// Gereksiz kelimeler (işaret dilinde kullanılmayan)
const STOP_WORDS = new Set([
  'BIR','BIRI','BIRISI','BIRKAC',
  'VE','ILE','VEYA','AMA','FAKAT','ANCAK','YANI',
  'DA','DE','MI','MU','MU','MI',
  'DIR','TIR','DUR','TUR','TIR','DIR',
  'KI','ICIN',
  'BU','SU','O','BUNU','SUNU','ONU','BUNUN','SUNUN','ONUN',
  'BANA','SANA','ONA','BIZE','SIZE','ONLARA',
  'BENIM','SENIN','ONUN','BIZIM','SIZIN','ONLARIN',
  // 'NE','NEREDE' artik isaretleri var, STOP_WORDS'tan cikarildi
  'NASIL','NEREYE','NEREDEN','NEDEN','NIYE','KIM','KIMIN',
  // 'COK' artik isareti var, cikarildi
  'AZ','BIRAZ','DAHA','EN',
  'VAR','YOK','OLAN','OLMAYAN',
  'BIR','IKI','UC','DORT','BES','ALTI','YEDI','SEKIZ','DOKUZ','ON',
  'GIBI','KADAR','GORE',
]);

// Basit Türkçe ek temizleme (suffix stripping)
function stemTurkish(word){
  const w = word.toUpperCase();
  // Sırayla uzun eklerden kısa eklere
  const suffixes = [
    // Fiil ekleri
    'IYORUM','UYORUM','IYORSUN','UYORSUN','IYOR','UYOR','IYOR','UYOR',
    'ACAGIM','ECEGIM','ACAKSIN','ECEKSIN','ACAK','ECEK',
    'IYORUZ','UYORUZ','IYORLAR','UYORLAR',
    // Aorist (gorusur, gorusurum, gorusursun, gorusuruz...)
    'IRSUNUZ','URSUNUZ','ARSUNUZ','ERSUNUZ',
    'IRSINIZ','URSUNUZ','ARSINIZ','ERSINIZ',
    'IRLAR','URLAR','ARLAR','ERLAR',
    'IRSUN','URSUN','ARSIN','ERSIN',
    'IRUM','URUM','ARIM','ERIM',
    'IRIZ','URUZ','ARIZ','ERIZ',
    // Cohortative (1.cogul: yapalim/gidelim/icelim/yiyelim)
    'YELIM','YALIM','ELIM','ALIM',
    'MISTIM','MUSTUM','MISTI','MUSTU',
    'MISSIN','MUSSUN','MISSA','MUSSA',
    'MISIN','MUSUN','MIYIM','MUYUM',
    'MISTI','MUSTU','MISTIK','MUSTUK',
    'DIM','DUM','DIN','DUN','DI','DU',
    'TIM','TUM','TIN','TUN','TI','TU',
    'YIM','YUM','YIN','YUN',
    'MAK','MEK','MASI','MESI',
    // İsim ekleri
    'LARIN','LERIN','LARI','LERI',
    'LARA','LERE','LARDAN','LERDEN',
    'IMIZ','UMUZ','INIZ','UNUZ',
    'NIZI','NUZU','NISI','NUSU',
    'ININ','UNUN','LARIN','LERIN',
    'IYLA','UYLA','IYLE','UYLE',
    'INDA','UNDA','INDE','UNDE',
    'INDAN','UNDAN','INDEN','UNDEN',
    'INA','UNA','INE','UNE',
    'INI','UNU','NIN','NUN',
    'DAN','DEN','TAN','TEN',
    'DA','DE','TA','TE',
    'YA','YE','NA','NE',
    'NI','NU','IN','UN',
    'IM','UM','A','E',
  ];

  // Iteratif stem — 3 kez kadar tekrarla (compound ekleri tamamen soysun)
  // ornek: YANINDAKI -> YANINDA -> YAN, GORUSURUZ -> GORUS, KENDINE -> KENDI -> KEND
  let cur = w;
  for(let iter = 0; iter < 3; iter++){
    let stripped = false;
    for(const s of suffixes){
      if(cur.length >= s.length + 2 && cur.endsWith(s)){
        cur = cur.slice(0, -s.length);
        stripped = true;
        break;
      }
    }
    if(!stripped) break;
  }
  return cur;
}

// Kelime eşleştirme — önce direkt, sonra stem, sonra mastar, en son fuzzy
function findMatchingWord(word){
  const w = turkishToASCII(word).toUpperCase();
  // 1) Direkt eşleşme
  if(savedPoses[w]) return w;
  // 2) Stem eşleşmesi
  const stemmed = stemTurkish(w);
  if(savedPoses[stemmed]) return stemmed;
  // 3) Mastar formu — BAK -> BAKMAK, GIT -> GITMEK, IC -> ICMEK
  for(const inf of [stemmed+'MAK', stemmed+'MEK']){
    if(savedPoses[inf]) return inf;
  }
  // 4) Poses arasinda stem'i AYNI olanlari onceleyerek ara (kesin eslesme)
  for(const poseWord of Object.keys(savedPoses)){
    if(stemTurkish(poseWord) === stemmed) return poseWord;
  }
  // 5) Fuzzy: en kisa baslayan adayi sec (BAKLAVA yerine BAKMAK seçilmesin diye uzunluk farki en az olan)
  let best = null, bestDelta = Infinity;
  for(const poseWord of Object.keys(savedPoses)){
    if(poseWord.startsWith(stemmed) || stemmed.startsWith(poseWord)){
      const delta = Math.abs(poseWord.length - stemmed.length);
      if(delta < bestDelta){ bestDelta = delta; best = poseWord; }
    }
  }
  return best;
}

// Demo için hızlı cümle butonları
// ─── STT (Sesle Yazdirma) ───
let _recog = null;
let _recogActive = false;
window.toggleMic = function(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Bu tarayıcı sesli girişi desteklemiyor (Chrome/Edge dene).'); return; }
  const btn = document.getElementById('micBtn');
  if(_recogActive){
    if(_recog) _recog.stop();
    return;
  }
  _recog = new SR();
  _recog.lang = 'tr-TR';
  _recog.interimResults = true;
  _recog.continuous = false;
  const inp = document.getElementById('sentenceInput');
  _recog.onstart = ()=>{
    _recogActive = true;
    btn.textContent = '🔴';
    btn.title = 'Dinleniyor… durdurmak için tıkla';
  };
  _recog.onresult = (ev)=>{
    let txt = '';
    for(let i = ev.resultIndex; i < ev.results.length; i++){
      txt += ev.results[i][0].transcript;
    }
    inp.value = txt.trim();
  };
  _recog.onerror = (e)=>{
    console.warn('Mic error:', e);
    btn.textContent = '🎙️';
    _recogActive = false;
  };
  _recog.onend = ()=>{
    btn.textContent = '🎙️';
    btn.title = 'Sesle yaz';
    _recogActive = false;
    if(inp.value.trim()){ window.processAndPlay(); }
  };
  _recog.start();
};

window.quickPhrase = function(text){
  const inp = document.getElementById('sentenceInput');
  if(!inp) return;
  inp.value = text;
  inp.focus();
  // process & play
  if(typeof window.processAndPlay === 'function') window.processAndPlay();
};

// Cümle işle ve oynat
window.processAndPlay = async function(){
  const input = document.getElementById('sentenceInput').value.trim();
  if(!input || !ready) return;

  // Kelimelere ayır ve Türkçe karakterleri dönüştür
  const rawWords = input.split(/\s+/);
  const glossWords = [];
  const notFound = [];

  // SORU tespiti — mi/mu/mı/mü eki veya soru sözcüğü varsa sona SORU eklenecek
  const QUESTION_TRIGGERS = new Set(['MI','MU','MİSİN','MUSUN','MIYIM','MUYUM',
                                     'NE','KAC','NEREDE','NASILSIN','HANGI','NIYE','NEDEN','KIM']);
  let isQuestion = input.trim().endsWith('?');
  for(const raw of rawWords){
    const ascii = turkishToASCII(raw).toUpperCase().replace(/[^A-Z]/g,'');
    if(QUESTION_TRIGGERS.has(ascii)) { isQuestion = true; break; }
  }

  for(const raw of rawWords){
    const ascii = turkishToASCII(raw).toUpperCase().replace(/[^A-Z]/g,'');

    // Stop word mi?
    if(STOP_WORDS.has(ascii)) continue;

    // Eşleşme bul
    const match = findMatchingWord(raw);
    if(match){
      // Aynı kelime art arda ekleme
      if(glossWords.length === 0 || glossWords[glossWords.length-1] !== match){
        glossWords.push(match);
      }
    } else {
      notFound.push(raw);
    }
  }

  // Soru ise sona SORU isareti ekle (savedPoses'da varsa)
  if(isQuestion && savedPoses['SORU']){
    if(glossWords.length === 0 || glossWords[glossWords.length-1] !== 'SORU'){
      glossWords.push('SORU');
    }
  }

  if(glossWords.length === 0){
    setStatus('Eşleşen kelime bulunamadı: ' + rawWords.join(', '), 3000);
    return;
  }

  // Bulunamayan kelimeleri göster
  if(notFound.length > 0){
    console.warn('Bulunamayan kelimeler:', notFound);
    setStatus('Eksik: ' + notFound.join(', ') + ' | Oynatılıyor: ' + glossWords.join(' '), 4000);
  } else {
    setStatus('Oynatılıyor: ' + glossWords.join(' → '), 3000);
  }

  // Sırayla oynat
  for(const w of glossWords){
    if(_stopFlag) break;
    document.getElementById('glossInput').value = w;
    await window.playWord();
    if(!_stopFlag) await new Promise(r => setTimeout(r, 300));
  }
  document.getElementById('glossInput').value = '';
};
